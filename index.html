<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spinning Wheel Calendar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 0;
            position: fixed;
            width: 100%;
            height: 100vh;
            touch-action: none;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            flex: 1;
        }

        .wheel-section {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
            cursor: grab;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.3));
            border-radius: 50%;
            touch-action: none;
            width: 100%;
            max-width: 90vmin;
            height: auto;
            aspect-ratio: 1;
        }

        canvas:active {
            cursor: grabbing;
        }

        .selector-line {
            position: absolute;
            right: -50px;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 8px;
            background: linear-gradient(90deg, #00d4ff, #0099ff);
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.5);
            pointer-events: none;
        }

        .info-section {
            background: white;
            padding: 20px;
            border-radius: 15px 15px 0 0;
            box-shadow: 0 -5px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            text-align: center;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .date-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            text-align: center;
            width: 100%;
        }

        .date-display .day-name {
            font-size: 24px;
            font-weight: bold;
        }

        .date-display .date-value {
            font-size: 14px;
            opacity: 0.95;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .info-section {
                padding: 15px;
                min-height: 90px;
            }

            .selector-line {
                right: -40px;
                width: 40px;
            }

            .date-display .day-name {
                font-size: 20px;
            }

            .date-display .date-value {
                font-size: 12px;
            }
        }

        @media (max-width: 360px) {
            .info-section {
                padding: 12px;
                min-height: 80px;
            }

            .selector-line {
                right: -30px;
                width: 30px;
            }

            .date-display .day-name {
                font-size: 18px;
            }

            .date-display .date-value {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="wheel-section">
            <canvas id="wheelCanvas"></canvas>
            <div class="selector-line"></div>
        </div>
    </div>

    <div class="info-section">
        <div class="date-display">
            <div class="day-name" id="dayName">Monday</div>
            <div class="date-value" id="dateValue">January 1, 2024</div>
        </div>
    </div>

    <script src="calendar.js"></script>
</body>
</html>
